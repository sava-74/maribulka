name: 🚀 Deploy to Beget

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: maribulka-vue/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd maribulka-vue
          npm ci

      - name: 🏗️ Build Vue project
        run: |
          cd maribulka-vue
          npm run build
        env:
          NODE_ENV: production

      - name: 📝 Prepare API files
        run: |
          # Копируем API в dist
          cp -r api maribulka-vue/dist/

          # Заменяем плейсхолдер пароля на реальный из secrets
          sed -i "s/YOUR_PASSWORD_HERE/${{ secrets.DB_PASSWORD }}/g" maribulka-vue/dist/api/login.php

      - name: 🔧 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/beget_key
          chmod 600 ~/.ssh/beget_key
          ssh-keyscan -H sava7424.beget.tech >> ~/.ssh/known_hosts

      - name: 💾 Create backup on server
        run: |
          BACKUP_NAME="dist_backup_$(date +%Y%m%d_%H%M%S)"
          ssh -i ~/.ssh/beget_key sava7424@sava7424.beget.tech \
            "cd /home/s/sava7424/maribulka.rf/maribulka-vue && cp -r dist $BACKUP_NAME && echo 'Backup created: $BACKUP_NAME'"

      - name: 🚀 Deploy to Beget
        run: |
          # Синхронизируем dist на сервер
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/beget_key -o StrictHostKeyChecking=no" \
            maribulka-vue/dist/ \
            sava7424@sava7424.beget.tech:/home/s/sava7424/maribulka.rf/maribulka-vue/dist/

      - name: 🔗 Create media symlink
        run: |
          # Создаём "железный" симлинк с абсолютными путями
          ssh -i ~/.ssh/beget_key -o StrictHostKeyChecking=no sava7424@sava7424.beget.tech \
            "rm -f /home/s/sava7424/maribulka.rf/public_html/media && \
             ln -s /home/s/sava7424/maribulka.rf/media /home/s/sava7424/maribulka.rf/public_html/media && \
             echo '✅ Symlink (Absolute Path) created successfully'"

      - name: ✅ Verify deployment
        run: |
          echo "Waiting for site to update..."
          sleep 5

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -L "https://xn--80aac1alfd7a3a5g.xn--p1ai/")

          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Site is accessible (HTTP $RESPONSE)"
          else
            echo "⚠️  Site check returned HTTP $RESPONSE (may be redirect)"
          fi

      - name: 🧪 Test API
        run: |
          API_RESPONSE=$(curl -s -X POST https://xn--80aac1alfd7a3a5g.xn--p1ai/api/login \
            -H "Content-Type: application/json" \
            -d '{"login":"admin","password":"123"}')

          if echo "$API_RESPONSE" | grep -q '"success":true'; then
            echo "✅ API is working correctly"
          else
            echo "⚠️  API test response: $API_RESPONSE"
          fi

      - name: 📊 Deployment summary
        if: success()
        run: |
          echo "## ✨ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Site:** http://марибулька.рф" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Time:** $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "📝 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests Passed:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Site is accessible" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API is working" >> $GITHUB_STEP_SUMMARY

      - name: 🔔 Notify on failure
        if: failure()
        run: |
          echo "## ❌ Deployment Failed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
